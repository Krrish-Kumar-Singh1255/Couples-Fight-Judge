<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couples Fight Judge - DEMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #1a1f3c; color: white; min-h-screen: 100vh; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .text-gold { color: #f0c040; }
        .bg-gold { background-color: #f0c040; }
        .bg-navy { background-color: #1a1f3c; }
        .sentence-box { border: 2px solid #f0c040; background-color: rgba(146, 64, 14, 0.2); padding: 1.5rem; border-radius: 0.5rem; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#1a1f3c',
                        gold: '#f0c040',
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        // Simple SVG Icons since we can't easily use Lucide-React via CDN without extra setup
        const ScaleIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-gold"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h18"/></svg>
        );

        const GavelIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m14.5 12.5-8 8a2.11 2.11 0 1 1-3-3l8-8"/><path d="m16 16 2 2"/><path d="m2 2 22 22"/><path d="m22 7-2-2"/><path d="m20 11-8-8"/></svg>
        );

        function App() {
            const [step, setStep] = useState(1);
            const [boyName, setBoyName] = useState('');
            const [boyStory, setBoyStory] = useState('');
            const [boyComplaint, setBoyComplaint] = useState('');
            const [girlName, setGirlName] = useState('');
            const [girlStory, setGirlStory] = useState('');
            const [girlComplaint, setGirlComplaint] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [verdict, setVerdict] = useState(null);
            const [error, setError] = useState(null);
            const [loadingText, setLoadingText] = useState('Reviewing the evidence...');
            const [apiKey, setApiKey] = useState('');

            const loadingPhrases = [
                "Reviewing the evidence...",
                "Consulting relationship law...",
                "Checking who left the dishes...",
                "Verdict incoming..."
            ];

            useEffect(() => {
                if (isLoading) {
                    let i = 0;
                    const interval = setInterval(() => {
                        setLoadingText(loadingPhrases[i % loadingPhrases.length]);
                        i++;
                    }, 2000);
                    return () => clearInterval(interval);
                }
            }, [isLoading]);

            const submitToJudge = async () => {
                if (!apiKey) {
                    setError("Please enter a Google API Key to proceed.");
                    setStep(5);
                    return;
                }
                if (isLoading) return; // Prevent multiple clicks

                setIsLoading(true);
                setError(null);
                setStep(4);

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{
                                    text: `You are a strict, dramatic relationship court judge. You receive both sides of a couple's fight and you must fairly analyze who is more at fault. Be genuinely fair and analytical.
                                    Output ONLY valid JSON with no extra text, no markdown, no backticks.
                                    Use this exact structure:
                                    {
                                      "boy_fault_percent": <number 0-100>,
                                      "girl_fault_percent": <number 0-100>,
                                      "evidence_points": ["point 1", "point 2", "point 3"],
                                      "judge_remarks": "Your dramatic 1-2 sentence judicial commentary here.",
                                      "primary_fault": "boy" or "girl" or "equal"
                                    }
                                    boy_fault_percent + girl_fault_percent must always equal 100.

                                    FIGHT DETAILS:
                                    BOY'S NAME: ${boyName}
                                    BOY'S SIDE: ${boyStory}
                                    BOY'S COMPLAINT: ${boyComplaint}

                                    GIRL'S NAME: ${girlName}
                                    GIRL'S SIDE: ${girlStory}
                                    GIRL'S COMPLAINT: ${girlComplaint}

                                    Analyze this fight and return your verdict as JSON.`
                                }]
                            }],
                            generationConfig: {
                                response_mime_type: "application/json"
                            }
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || 'Failed to reach the judge');
                    }

                    const data = await response.json();
                    if (!data.candidates?.[0]?.content?.parts?.[0]?.text) {
                        throw new Error('The judge gave an empty verdict. Try again.');
                    }
                    const resultText = data.candidates[0].content.parts[0].text;
                    const cleanedText = resultText.replace(/```json|```/g, '').trim();
                    const parsedVerdict = JSON.parse(cleanedText);
                    setVerdict(parsedVerdict);
                    setStep(5);
                } catch (err) {
                    console.error('API Error:', err);
                    setError(err.message);
                    setStep(5);
                } finally {
                    setIsLoading(false);
                }
            };

            const reset = () => {
                setStep(1);
                setBoyName('');
                setBoyStory('');
                setBoyComplaint('');
                setGirlName('');
                setGirlStory('');
                setGirlComplaint('');
                setVerdict(null);
                setError(null);
            };

            const logoutTrap = () => {
                alert("ALERT: Unauthorized access detected. System is resetting...");
                reset();
            };

            const decoyClick = () => {
                const funnyMessages = [
                    "Nice try, but that's a decoy!",
                    "The Judge is watching you click wrong buttons...",
                    "Incorrect button. Relationship points deducted.",
                    "That button is for couples who don't fight.",
                    "Access Denied. Try the other one."
                ];
                alert(funnyMessages[Math.floor(Math.random() * funnyMessages.length)]);
            };

            return (
                <div className={`min-h-screen transition-colors duration-1000 ${
                    step === 3 ? 'bg-pink-950/40' : step === 2 ? 'bg-blue-950/40' : 'bg-navy'
                }`}>
                    <div className="max-w-2xl mx-auto px-4 py-12 min-h-screen flex flex-col justify-center">
                        <AnimatePresence mode="wait">
                        {step === 1 && (
                            <motion.div 
                                key="landing"
                                initial={{ opacity: 0, y: 20 }}
                                animate={{ opacity: 1, y: 0 }}
                                exit={{ opacity: 0, y: -20 }}
                                className="text-center space-y-8"
                            >
                                <div className="flex justify-center mb-4">
                                    <ScaleIcon />
                                </div>
                                <h1 className="text-5xl font-serif font-bold text-gold">Couples Fight Judge</h1>
                                <p className="text-2xl italic text-white/90">"Fair verdict. Unfair outcome."</p>
                                <p className="text-gray-400">Tell us your fight. We'll decide who's wrong. (The sentence is already decided.)</p>
                                
                                <div className="flex flex-col items-center gap-4 pt-4">
                                    <input 
                                        type="password" 
                                        placeholder="Enter Google API Key"
                                        value={apiKey}
                                        onChange={(e) => setApiKey(e.target.value)}
                                        className="max-w-sm w-full bg-navy border border-gray-700 p-3 rounded focus:border-gold outline-none text-sm"
                                    />
                                    
                                    <div className="flex gap-4">
                                        <button 
                                            onClick={decoyClick}
                                            className="bg-gold text-navy font-bold py-4 px-8 rounded-full text-xl hover:scale-105 transition-transform shadow-lg opacity-90"
                                        >
                                            Settle This Fight
                                        </button>
                                        <button 
                                            onClick={() => setStep(2)}
                                            className="bg-gold text-navy font-bold py-4 px-8 rounded-full text-xl hover:scale-105 transition-transform shadow-lg"
                                        >
                                            Settle This Fight
                                        </button>
                                        <button 
                                            onClick={decoyClick}
                                            className="bg-gold text-navy font-bold py-4 px-8 rounded-full text-xl hover:scale-105 transition-transform shadow-lg opacity-90"
                                        >
                                            Settle This Fight
                                        </button>
                                    </div>

                                    <button 
                                        onClick={logoutTrap}
                                        className="text-red-500/50 hover:text-red-500 text-sm font-bold border border-red-500/20 px-4 py-1 rounded mt-8 transition-colors"
                                    >
                                        DON'T CLICK THIS BUTTON
                                    </button>
                                </div>
                                <p className="text-xs text-gray-500 mt-12 italic">Warning: verdict is always fair. Sentence is not.</p>
                            </motion.div>
                        )}

                        {step === 2 && (
                            <motion.div 
                                key="boy-side"
                                initial={{ opacity: 0, x: 20 }}
                                animate={{ opacity: 1, x: 0 }}
                                exit={{ opacity: 0, x: -20 }}
                                className="space-y-6"
                            >
                                <div className="flex items-center gap-3 text-blue-400">
                                    <GavelIcon />
                                    <h2 className="text-2xl font-serif">The Defendant's Side (Boy)</h2>
                                </div>
                                <div className="space-y-4">
                                    <div>
                                    <label className="block text-sm font-medium mb-1">Your Name</label>
                                    <input 
                                        type="text" 
                                        autoFocus
                                        value={boyName}
                                        onChange={(e) => setBoyName(e.target.value)}
                                        placeholder="Enter your name"
                                        className="w-full bg-navy border border-blue-900/50 p-3 rounded focus:border-blue-400 outline-none"
                                    />
                                </div>
                                    <div>
                                        <label className="block text-sm font-medium mb-1">What happened? Tell your side of the fight.</label>
                                        <textarea 
                                            rows="4"
                                            value={boyStory}
                                            onChange={(e) => setBoyStory(e.target.value)}
                                            placeholder="Be honest..."
                                            className="w-full bg-navy border border-blue-900/50 p-3 rounded focus:border-blue-400 outline-none"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium mb-1">What did she do that was wrong? (Optional)</label>
                                        <textarea 
                                            rows="2"
                                            value={boyComplaint}
                                            onChange={(e) => setBoyComplaint(e.target.value)}
                                            placeholder="Evidence against the plaintiff..."
                                            className="w-full bg-navy border border-blue-900/50 p-3 rounded focus:border-blue-400 outline-none"
                                        />
                                    </div>
                                    <button 
                                        onClick={() => setStep(3)}
                                        disabled={!boyName || !boyStory}
                                        className="w-full bg-blue-600 text-white font-bold py-3 rounded flex items-center justify-center gap-2 disabled:opacity-50 shadow-lg shadow-blue-500/10"
                                    >
                                        Next Side →
                                    </button>
                                </div>
                            </motion.div>
                        )}

                        {step === 3 && (
                            <motion.div 
                                key="girl-side"
                                initial={{ opacity: 0, x: 20 }}
                                animate={{ opacity: 1, x: 0 }}
                                exit={{ opacity: 0, x: -20 }}
                                className="space-y-6"
                            >
                                <div className="flex items-center gap-3 text-pink-400">
                                    <GavelIcon />
                                    <h2 className="text-2xl font-serif">The Plaintiff's Side (Girl)</h2>
                                </div>
                                <div className="space-y-4">
                                    <div>
                                    <label className="block text-sm font-medium mb-1">Your Name</label>
                                    <input 
                                        type="text" 
                                        autoFocus
                                        value={girlName}
                                        onChange={(e) => setGirlName(e.target.value)}
                                        placeholder="Enter your name"
                                        className="w-full bg-navy border border-pink-900/50 p-3 rounded focus:border-pink-400 outline-none"
                                    />
                                </div>
                                    <div>
                                        <label className="block text-sm font-medium mb-1">What happened? Tell your side of the fight.</label>
                                        <textarea 
                                            rows="4"
                                            value={girlStory}
                                            onChange={(e) => setGirlStory(e.target.value)}
                                            placeholder="Tell the truth..."
                                            className="w-full bg-navy border border-pink-900/50 p-3 rounded focus:border-pink-400 outline-none"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium mb-1">What did he do that was wrong? (Optional)</label>
                                        <textarea 
                                            rows="2"
                                            value={girlComplaint}
                                            onChange={(e) => setGirlComplaint(e.target.value)}
                                            placeholder="Evidence against the defendant..."
                                            className="w-full bg-navy border border-pink-900/50 p-3 rounded focus:border-pink-400 outline-none"
                                        />
                                    </div>
                                    <button 
                                        onClick={submitToJudge}
                                        disabled={!girlName || !girlStory}
                                        className="w-full bg-pink-600 text-white font-bold py-3 rounded flex items-center justify-center gap-2 disabled:opacity-50 shadow-lg shadow-pink-500/10"
                                    >
                                        Submit to the Judge ⚖️
                                    </button>
                                </div>
                            </motion.div>
                        )}

                        {step === 4 && (
                            <motion.div 
                                key="loading"
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                exit={{ opacity: 0 }}
                                className="text-center space-y-8"
                            >
                                <motion.div
                                    animate={{ rotate: [0, -10, 10, -10, 10, 0] }}
                                    transition={{ repeat: Infinity, duration: 2 }}
                                    className="flex justify-center"
                                >
                                    <ScaleIcon />
                                </motion.div>
                                <h2 className="text-3xl font-serif text-gold">Court is in session...</h2>
                                <p className="text-xl animate-pulse text-white/80">{loadingText}</p>
                            </motion.div>
                        )}

                        {step === 5 && (
                            <motion.div 
                                key="verdict"
                                initial={{ opacity: 0, scale: 0.95 }}
                                animate={{ opacity: 1, scale: 1 }}
                                className="space-y-8 pb-12"
                            >
                                {error ? (
                                    <div className="bg-red-900/20 border border-red-500 p-6 rounded text-center space-y-4">
                                        <h2 className="text-xl font-bold text-red-500">The Judge is Busy</h2>
                                        <p className="text-gray-400">{error}</p>
                                        <button onClick={reset} className="bg-gray-700 py-2 px-6 rounded hover:bg-gray-600">Try Again</button>
                                    </div>
                                ) : verdict && (
                                    <>
                                        <div className="text-center space-y-2">
                                            <h1 className="text-4xl font-serif font-bold text-gold uppercase tracking-widest">The Court Has Ruled</h1>
                                            <p className="text-xl text-gray-400">{boyName} vs {girlName}</p>
                                        </div>

                                        <div className="space-y-4">
                                            <div className="flex justify-between text-sm font-bold uppercase tracking-wider">
                                                <span className="text-pink-400">{girlName} ({verdict.girl_fault_percent}%)</span>
                                                <span className="text-blue-400">{boyName} ({verdict.boy_fault_percent}%)</span>
                                            </div>
                                            <div className="h-6 w-full bg-gray-800 rounded-full overflow-hidden flex shadow-inner">
                                                <div 
                                                    className="h-full bg-pink-500 transition-all duration-1000" 
                                                    style={{ width: `${verdict.girl_fault_percent}%` }}
                                                />
                                                <div 
                                                    className="h-full bg-blue-500 transition-all duration-1000" 
                                                    style={{ width: `${verdict.boy_fault_percent}%` }}
                                                />
                                            </div>
                                            <p className="text-center text-xs text-gray-500 tracking-tighter uppercase">Fault Percentage Split</p>
                                        </div>

                                        <div className="space-y-4 bg-gray-900/50 p-6 rounded-lg border border-gray-800 shadow-xl">
                                            <h3 className="text-gold font-bold uppercase text-sm tracking-widest">Evidence Findings</h3>
                                            <ul className="list-disc list-inside space-y-2 text-gray-300">
                                                {verdict.evidence_points.map((point, idx) => (
                                                    <li key={idx}>{point}</li>
                                                ))}
                                            </ul>
                                        </div>

                                        <div className="italic text-lg text-center px-4 text-white/90">
                                            "{verdict.judge_remarks}"
                                        </div>

                                        <div className="sentence-box space-y-4 shadow-xl shadow-gold/5">
                                            <h3 className="text-gold font-bold uppercase text-center tracking-widest text-sm">The Sentence</h3>
                                            <p className="text-xl text-center leading-relaxed font-bold">
                                                {verdict.primary_fault === 'girl' && (
                                                    <>{boyName}, even though {girlName} was primarily at fault, per Relationship Code §69.4, you are hereby ordered to apologize immediately, bring snacks, and never mention this again.</>
                                                )}
                                                {verdict.primary_fault === 'boy' && (
                                                    <>{boyName}, you were clearly wrong. The court orders you to apologize immediately. Go. Now.</>
                                                )}
                                                {verdict.primary_fault === 'equal' && (
                                                    <>Both parties share blame equally. {boyName} must still apologize first. This is the law.</>
                                                )}
                                            </p>
                                        </div>

                                        <div className="flex gap-4">
                                            <button 
                                                onClick={() => {
                                                    const text = `COURT VERDICT: ${boyName} vs ${girlName}\nFault: ${girlName} ${verdict.girl_fault_percent}% | ${boyName} ${verdict.boy_fault_percent}%\n\nSentence: Regardless of fault, ${boyName} must apologize immediately.\n\nTry it now!`;
                                                    navigator.clipboard.writeText(text);
                                                    alert('Verdict copied to clipboard!');
                                                }}
                                                className="flex-1 border border-gray-700 py-3 rounded flex items-center justify-center gap-2 hover:bg-gray-800 transition-colors"
                                            >
                                                Share Verdict
                                            </button>
                                            <button 
                                                onClick={reset}
                                                className="flex-1 bg-gold text-navy font-bold py-3 rounded flex items-center justify-center gap-2 shadow-lg shadow-gold/20 hover:scale-105 transition-transform"
                                            >
                                                Fight Again
                                            </button>
                                        </div>

                                        <p className="text-center text-xs text-gray-500 italic mt-8">
                                            This verdict is legally binding in 0 countries.
                                        </p>
                                    </>
                                )}
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
